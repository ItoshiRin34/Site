<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Primeiro Site - SI</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212; /* Fundo escuro de programador */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .cartao {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 2px solid #06d9f5; /* Bordinha verde neon */
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        button {
            background-color: #00ff88;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00cc6e;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="cartao">
        <h1>Bora, SI, e ADS (pq tem o Fabio no grupo)! 🚀</h1>
        <p>Este é o primeiro site do nosso grupo.</p>
        <p>VS Code instalado e muita fé!</p>
        <br>
        <button onclick="avisar()">Clique aqui</button>
    </div>

    <script src="script.js">
        
    </script>

</body>
</html>
